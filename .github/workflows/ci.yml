name: CI — Test & Build

on:
  push:
  pull_request:

jobs:
  # ─── Job 1: Backend Tests ──────────────────────────────
  test-backend:
    name:  Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run tests
        run: |
          cd backend
          pytest tests/ -v --tb=short

  # ─── Job 2: Frontend Build Check ──────────────────────
  build-frontend:
    name:  Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Build and verify
        run: |
          cd frontend
          npm run build

  # ─── Job 3: Merge Conflict Check ──────────────────────
  check-conflicts:
    name:  Check Merge Conflicts
    runs-on: ubuntu-latest
    if: github.ref != 'refs/heads/main' # Only run on non-main branches

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Needed to fetch main branch history

      - name: Attempt merge with main
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          # Fetch main to compare against
          git fetch origin main
          
          # Attempt a dry-run merge
          if git merge origin/main --no-commit --no-ff; then
            echo "✅ No merge conflicts with main detected!"
          else
            echo "❌ MERGE CONFLICT DETECTED!"
            echo "Please pull the latest main branch and resolve conflicts locally."
            exit 1
          fi
