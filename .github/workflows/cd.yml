name: CD — Deploy to Railway & Vercel

on:
  push:
    branches: [main]   # Only deploy when code lands on main

jobs:
  # ─── Job 1: Deploy Backend → Railway ──────────────────
  deploy-backend:
    name: 🚂 Deploy Backend to Railway
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: |
          cd backend
          railway up --service ai-camera-backend --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  # ─── Job 2: Build & Push Docker Image → Docker Hub ────
  # (Optional backup — Railway also builds directly from GitHub)
  push-docker-image:
    name: 🐳 Push Docker Image to Hub
    runs-on: ubuntu-latest
    needs: deploy-backend   # Only runs after deploy succeeds

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/ai-camera-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/ai-camera-backend:${{ github.sha }}
