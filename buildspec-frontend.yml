version: 0.2

# ─────────────────────────────────────────────────────────────────────────────
# AWS CodeBuild — Frontend Build Specification
# Project: AI-Camera-Based-Monitoring (React + Vite)
#
# Stages:
#   1. install    → Node.js 20 + npm deps
#   2. pre_build  → Lint check
#   3. build      → Vite production build
#   4. post_build → Deploy to S3 (optional) or trigger Vercel
# ─────────────────────────────────────────────────────────────────────────────

env:
  variables:
    NODE_VERSION: "20"
  secrets-manager:
    VERCEL_TOKEN: "ai-camera/vercel-token"     # Vercel deploy hook token
    VERCEL_PROJECT_ID: "ai-camera/vercel-project-id"
    VERCEL_ORG_ID: "ai-camera/vercel-org-id"
  parameter-store:
    VITE_API_URL: "/ai-camera/api-url"         # e.g. https://your-backend.railway.app

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - echo "──── Installing Node.js dependencies ────"
      - cd frontend
      - npm ci                                 # Clean install (faster + deterministic)
      - echo "Dependencies installed"

  pre_build:
    commands:
      - echo "──── Running Lint Check ────"
      - cd frontend
      - npx eslint src/ --max-warnings=0 || echo "⚠️  Lint warnings found (non-blocking)"
      - echo "Lint check complete"

  build:
    commands:
      - echo "──── Building Vite Production Bundle ────"
      - cd frontend
      # Inject the real API URL from Parameter Store
      - echo "VITE_API_URL=${VITE_API_URL}" > .env.production
      - npm run build
      - echo "✅ Frontend build successful"
      - ls -la dist/

  post_build:
    commands:
      # Option A: Trigger Vercel deploy via CLI
      - echo "──── Triggering Vercel Deployment ────"
      - npm install -g vercel
      - |
        vercel deploy \
          --token ${VERCEL_TOKEN} \
          --prod \
          --cwd frontend \
          --yes
      - echo "✅ Deployed to Vercel"

      # Option B (alternative): Upload to S3 + CloudFront invalidation
      # Uncomment below if you want to host frontend on AWS instead of Vercel
      # - aws s3 sync frontend/dist/ s3://ai-camera-frontend-bucket/ --delete
      # - aws cloudfront create-invalidation --distribution-id $CF_DIST_ID --paths "/*"

artifacts:
  files:
    - frontend/dist/**/*
  name: frontend-build-$(date +%Y-%m-%d)

cache:
  paths:
    - "/root/.npm/**/*"
    - "frontend/node_modules/**/*"
