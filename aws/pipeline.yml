AWSTemplateFormatVersion: '2010-09-09'
Description: >
  AWS CodePipeline + CodeBuild CI/CD for AI-Camera-Based-Monitoring
  
  This template creates:
    - CodePipeline (orchestrates the full pipeline)
    - CodeBuild project for backend (test + docker build + ECR push)
    - CodeBuild project for frontend (build + Vercel deploy)
    - ECR repository for Docker images
    - S3 bucket for pipeline artifacts
    - IAM roles with least-privilege permissions

# ─────────────────────────────────────────────────────────────────────────────
Parameters:
# ─────────────────────────────────────────────────────────────────────────────

  GitHubOwner:
    Type: String
    Description: "Your GitHub username"
    Default: "your-github-username"

  GitHubRepo:
    Type: String
    Description: "Repository name"
    Default: "AI-Camera-Based-Monitoring"

  GitHubBranch:
    Type: String
    Description: "Branch to deploy from"
    Default: "main"

  GitHubConnectionArn:
    Type: String
    Description: "ARN of the CodeStar GitHub connection (create in Console first)"

  ProjectName:
    Type: String
    Default: "ai-camera-monitoring"
    Description: "Used as prefix for all resource names"

# ─────────────────────────────────────────────────────────────────────────────
Resources:
# ─────────────────────────────────────────────────────────────────────────────

  # ── S3 Bucket for pipeline artifacts ──────────────────────────────────────
  ArtifactBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${ProjectName}-pipeline-artifacts-${AWS::AccountId}"
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldArtifacts
            Status: Enabled
            ExpirationInDays: 30         # Auto-delete artifacts after 30 days
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  # ── ECR Repository for backend Docker images ───────────────────────────────
  BackendECRRepo:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub "${ProjectName}-backend"
      ImageScanningConfiguration:
        ScanOnPush: true                 # Auto security scan on every push
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Keep last 10 images",
                "selection": {
                  "tagStatus": "any",
                  "countType": "imageCountMoreThan",
                  "countNumber": 10
                },
                "action": { "type": "expire" }
              }
            ]
          }

  # ── IAM Role for CodeBuild ─────────────────────────────────────────────────
  CodeBuildRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-codebuild-role"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CodeBuildPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # CloudWatch Logs — for build logs
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "*"
              # S3 — read/write artifacts
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:GetBucketAcl
                  - s3:GetBucketLocation
                Resource:
                  - !GetAtt ArtifactBucket.Arn
                  - !Sub "${ArtifactBucket.Arn}/*"
              # ECR — push Docker images
              - Effect: Allow
                Action:
                  - ecr:GetAuthorizationToken
                  - ecr:BatchCheckLayerAvailability
                  - ecr:GetDownloadUrlForLayer
                  - ecr:BatchGetImage
                  - ecr:InitiateLayerUpload
                  - ecr:UploadLayerPart
                  - ecr:CompleteLayerUpload
                  - ecr:PutImage
                Resource: "*"
              # Secrets Manager — read secrets
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:ai-camera/*"
              # SSM Parameter Store — read params
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/ai-camera/*"
              # STS — for ECR login
              - Effect: Allow
                Action: sts:GetCallerIdentity
                Resource: "*"

  # ── IAM Role for CodePipeline ──────────────────────────────────────────────
  CodePipelineRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-pipeline-role"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codepipeline.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: PipelinePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:GetBucketVersioning
                Resource:
                  - !GetAtt ArtifactBucket.Arn
                  - !Sub "${ArtifactBucket.Arn}/*"
              - Effect: Allow
                Action:
                  - codebuild:BatchGetBuilds
                  - codebuild:StartBuild
                Resource: "*"
              - Effect: Allow
                Action:
                  - codestar-connections:UseConnection
                Resource: !Ref GitHubConnectionArn

  # ── CodeBuild — Backend Project ────────────────────────────────────────────
  BackendBuildProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: !Sub "${ProjectName}-backend-build"
      Description: "Test FastAPI backend, build Docker image, push to ECR"
      ServiceRole: !GetAtt CodeBuildRole.Arn
      Artifacts:
        Type: CODEPIPELINE
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_MEDIUM   # 4 vCPU, 7GB RAM (needed for YOLOv8)
        Image: aws/codebuild/standard:7.0
        PrivilegedMode: true                 # Required for Docker builds
        EnvironmentVariables:
          - Name: AWS_DEFAULT_REGION
            Value: !Ref AWS::Region
          - Name: ECR_REPO_URI
            Value: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${BackendECRRepo}"
      Source:
        Type: CODEPIPELINE
        BuildSpec: buildspec-backend.yml
      LogsConfig:
        CloudWatchLogs:
          Status: ENABLED
          GroupName: !Sub "/codebuild/${ProjectName}-backend"
      TimeoutInMinutes: 30                   # Max build time

  # ── CodeBuild — Frontend Project ───────────────────────────────────────────
  FrontendBuildProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: !Sub "${ProjectName}-frontend-build"
      Description: "Build React frontend and deploy to Vercel"
      ServiceRole: !GetAtt CodeBuildRole.Arn
      Artifacts:
        Type: CODEPIPELINE
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_SMALL    # 2 vCPU, 3GB RAM (enough for frontend)
        Image: aws/codebuild/standard:7.0
        PrivilegedMode: false
      Source:
        Type: CODEPIPELINE
        BuildSpec: buildspec-frontend.yml
      LogsConfig:
        CloudWatchLogs:
          Status: ENABLED
          GroupName: !Sub "/codebuild/${ProjectName}-frontend"
      TimeoutInMinutes: 15

  # ── CodePipeline — Main Orchestrator ──────────────────────────────────────
  MainPipeline:
    Type: AWS::CodePipeline::Pipeline
    Properties:
      Name: !Sub "${ProjectName}-pipeline"
      RoleArn: !GetAtt CodePipelineRole.Arn
      ArtifactStore:
        Type: S3
        Location: !Ref ArtifactBucket

      Stages:

        # Stage 1: SOURCE — Pull code from GitHub
        - Name: Source
          Actions:
            - Name: GitHubSource
              ActionTypeId:
                Category: Source
                Owner: AWS
                Provider: CodeStarSourceConnection
                Version: '1'
              Configuration:
                ConnectionArn: !Ref GitHubConnectionArn
                FullRepositoryId: !Sub "${GitHubOwner}/${GitHubRepo}"
                BranchName: !Ref GitHubBranch
                DetectChanges: true          # Auto-trigger on git push
              OutputArtifacts:
                - Name: SourceCode

        # Stage 2: TEST & BUILD BACKEND — pytest + Docker build + ECR push
        - Name: Backend-Test-And-Build
          Actions:
            - Name: TestAndBuild
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: '1'
              Configuration:
                ProjectName: !Ref BackendBuildProject
              InputArtifacts:
                - Name: SourceCode
              OutputArtifacts:
                - Name: BackendBuildOutput
              RunOrder: 1

        # Stage 3: BUILD & DEPLOY FRONTEND — Vite build + Vercel deploy
        - Name: Frontend-Build-And-Deploy
          Actions:
            - Name: BuildAndDeploy
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: '1'
              Configuration:
                ProjectName: !Ref FrontendBuildProject
              InputArtifacts:
                - Name: SourceCode
              OutputArtifacts:
                - Name: FrontendBuildOutput
              RunOrder: 1

# ─────────────────────────────────────────────────────────────────────────────
Outputs:
# ─────────────────────────────────────────────────────────────────────────────

  PipelineName:
    Description: "Name of the CodePipeline"
    Value: !Ref MainPipeline

  PipelineURL:
    Description: "Direct link to pipeline in AWS Console"
    Value: !Sub "https://${AWS::Region}.console.aws.amazon.com/codesuite/codepipeline/pipelines/${MainPipeline}/view"

  ECRRepositoryURI:
    Description: "ECR repository URI for backend Docker images"
    Value: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${BackendECRRepo}"

  ArtifactBucketName:
    Description: "S3 bucket storing pipeline artifacts"
    Value: !Ref ArtifactBucket
