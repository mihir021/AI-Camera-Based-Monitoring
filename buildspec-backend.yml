version: 0.2

# ─────────────────────────────────────────────────────────────────────────────
# AWS CodeBuild — Backend Build Specification
# Project: AI-Camera-Based-Monitoring (FastAPI + YOLOv8)
#
# Stages:
#   1. install      → Python 3.11 + pip deps
#   2. pre_build    → Run pytest, login to ECR
#   3. build        → Docker build + tag
#   4. post_build   → Push image to ECR, update Railway deploy
# ─────────────────────────────────────────────────────────────────────────────

env:
  variables:
    PYTHON_VERSION: "3.11"
    AWS_DEFAULT_REGION: "ap-south-1"          # Mumbai region (closest to India)
    ECR_REPO_NAME: "ai-camera-backend"
  parameter-store:
    MONGODB_URI: "/ai-camera/mongodb-uri"     # Stored in AWS SSM Parameter Store
  secrets-manager:
    RAILWAY_TOKEN: "ai-camera/railway-token"  # For triggering Railway deploy

phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - echo "──── Installing Python dependencies ────"
      - cd backend
      - pip install --upgrade pip
      - pip install -r requirements.txt
      - echo "Dependencies installed successfully"

  pre_build:
    commands:
      - echo "──── Running Backend Tests ────"
      - cd backend
      # Create a minimal .env for tests (uses SSM value, not hardcoded)
      - echo "MONGODB_URI=${MONGODB_URI}" > .env
      - echo "PORT=8000" >> .env
      - echo "DEBUG=True" >> .env

      # Run pytest - PIPELINE STOPS if tests fail
      - pytest tests/ -v --tb=short --junitxml=test-results/results.xml
      - echo "✅ All tests passed!"

      # Login to Amazon ECR (Elastic Container Registry)
      - echo "──── Logging in to Amazon ECR ────"
      - AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
      - ECR_URI="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_DEFAULT_REGION}.amazonaws.com"
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $ECR_URI
      - IMAGE_TAG="${ECR_URI}/${ECR_REPO_NAME}:${CODEBUILD_RESOLVED_SOURCE_VERSION:0:8}"
      - IMAGE_TAG_LATEST="${ECR_URI}/${ECR_REPO_NAME}:latest"

  build:
    commands:
      - echo "──── Building Docker Image ────"
      - cd backend
      - docker build -t $IMAGE_TAG -t $IMAGE_TAG_LATEST .
      - echo "✅ Docker image built: $IMAGE_TAG"

  post_build:
    commands:
      - echo "──── Pushing Image to ECR ────"
      - docker push $IMAGE_TAG
      - docker push $IMAGE_TAG_LATEST
      - echo "✅ Image pushed to ECR successfully"

      # Trigger Railway redeploy via webhook
      - echo "──── Triggering Railway Deployment ────"
      - |
        curl -s -X POST \
          -H "Authorization: Bearer ${RAILWAY_TOKEN}" \
          -H "Content-Type: application/json" \
          "https://backboard.railway.app/graphql/v2" \
          --data '{"query":"mutation { serviceInstanceRedeploy(environmentId: \"production\") }"}' \
          && echo "✅ Railway deployment triggered"

      # Write image tag to file (used by CodePipeline for deploy stage)
      - printf '{"ImageURI":"%s"}' $IMAGE_TAG > imageDetail.json

artifacts:
  files:
    - imageDetail.json
    - backend/test-results/**/*
  name: backend-build-$(date +%Y-%m-%d)

reports:
  pytest-report:
    files:
      - "backend/test-results/results.xml"
    file-format: JUNITXML

cache:
  paths:
    - "/root/.cache/pip/**/*"
